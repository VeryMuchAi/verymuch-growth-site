<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ══════════ BRAND TOKENS (Brand Board v3) ══════════ */
:root{
  --charcoal:#363536;
  --accent-warm:#E8703A;
  --accent-amber:#F4A261;
  --accent-teal:#2ABFAA;
  --accent-ice:#7EC8D9;
  --accent-purple:#9B59B6;
  --success:#5BA66B;
  --error:#E85D5D;
  --icon-gradient:linear-gradient(135deg,#E8B88A,#E4CCA0,#C5DBBE,#A8D5C8,#9FD0DA);
  --accent-gradient:linear-gradient(135deg,#E8703A,#F4A261,#2ABFAA,#7EC8D9);
  --btn-gradient:linear-gradient(135deg,#E8703A,#F4A261,#2ABFAA,#7EC8D9,#9B59B6,#E8703A);
  /* Light mode */
  --bg-primary:#FAFAF8;--bg-secondary:#F0EFEB;--bg-card:#FFFFFF;
  --text-primary:#1A1A1A;--text-secondary:#555;--text-muted:#888;
  --border:#E0DED8;--border-hover:#C0BDB5;
  --shadow-sm:0 1px 3px rgba(0,0,0,.04);--shadow-md:0 4px 20px rgba(0,0,0,.06);
  --shadow-lg:0 12px 40px rgba(0,0,0,.08);--shadow-glow:0 0 40px rgba(232,112,58,.15);
  --logo-text:var(--charcoal);--logo-icon-text:var(--charcoal);
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
  --transition:.3s cubic-bezier(.4,0,.2,1);
}
.dark{
  --bg-primary:#0D0F11;--bg-secondary:#161A1E;--bg-card:#1C2127;
  --text-primary:#F0EFEB;--text-secondary:#A0A0A0;--text-muted:#666;
  --border:#2A2F36;--border-hover:#3A4048;
  --shadow-sm:0 1px 3px rgba(0,0,0,.2);--shadow-md:0 4px 20px rgba(0,0,0,.3);
  --shadow-lg:0 12px 40px rgba(0,0,0,.4);--shadow-glow:0 0 40px rgba(232,112,58,.2);
  --logo-text:#FFFFFF;--logo-icon-text:var(--charcoal);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Manrope',sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.6;overflow-x:hidden;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ══════════ BG ATMOSPHERE ══════════ */
.bg-atm{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-atm::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(232,112,58,.07) 0%,transparent 70%);top:-100px;right:-200px;animation:fOrb 20s ease-in-out infinite}
.bg-atm::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(42,191,170,.05) 0%,transparent 70%);bottom:-100px;left:-150px;animation:fOrb 25s ease-in-out infinite reverse}
@keyframes fOrb{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,-30px)}66%{transform:translate(-20px,20px)}}

.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:20px}

/* ══════════ LOGO (Brand Board v3) ══════════ */
/* PNG logo for light mode, CSS logo for dark mode */
.vm-logo{display:inline-flex;align-items:center;text-decoration:none}
.vm-logo-img{height:32px;width:auto;display:block}
.vm-logo-css{display:none}
.vm-logo-text{font-family:'Sora',sans-serif;font-weight:800;font-size:1.35rem;color:var(--logo-text);letter-spacing:-.03em;line-height:1}
.vm-logo-icon{font-family:'Sora',sans-serif;font-weight:700;font-size:.92rem;color:var(--logo-icon-text);background:var(--icon-gradient);border-radius:7px;padding:3px 8px;margin-left:1px;line-height:1.3}
.dark .vm-logo-img{display:none}
.dark .vm-logo-css{display:inline-flex;align-items:center}
.logo-c{text-align:center;margin-bottom:12px}

/* ══════════ TOP BAR ══════════ */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:4px}
.top-bar-left{display:flex;align-items:center;gap:8px}
.top-bar-right{display:flex;align-items:center;gap:4px}
.back-btn{padding:6px 14px;border:1.5px solid var(--border);border-radius:100px;background:transparent;font-family:'Sora',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.06em;color:var(--text-muted);cursor:pointer;transition:var(--transition);display:inline-flex;align-items:center;gap:5px;text-decoration:none}
.back-btn:hover{border-color:var(--accent-warm);color:var(--accent-warm)}
.lang-btn{padding:6px 14px;border:1.5px solid var(--border);border-radius:100px;background:transparent;font-family:'Sora',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:5px}
.lang-btn:hover{border-color:var(--accent-warm);color:var(--accent-warm)}
.lang-btn.active{background:var(--charcoal);color:#fff;border-color:var(--charcoal)}
.dark .lang-btn.active{background:#F0EFEB;color:var(--charcoal);border-color:#F0EFEB}

/* ══════════ THEME TOGGLE ══════════ */
.theme-btn{width:36px;height:36px;border:1.5px solid var(--border);border-radius:50%;background:var(--bg-card);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition);color:var(--text-muted);font-size:.85rem}
.theme-btn:hover{border-color:var(--accent-warm);color:var(--accent-warm);transform:rotate(15deg)}

/* ══════════ SECTIONS ══════════ */
.section{display:none}.section.active{display:block;animation:fadeUp .6s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes slideR{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulseR{0%{transform:scale(.9);opacity:1}100%{transform:scale(1.4);opacity:0}}

/* ══════════ HERO ══════════ */
.hero{text-align:center;padding:40px 0 20px}
.badge{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;background:var(--bg-card);border:1px solid var(--border);border-radius:100px;font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-warm);margin-bottom:24px;animation:scaleIn .5s ease .2s both}
.badge i{font-size:.7rem}
.h-title{font-family:'Sora',sans-serif;font-size:clamp(2rem,5.5vw,3.2rem);font-weight:800;line-height:1.1;margin-bottom:8px;letter-spacing:-.03em;animation:fadeUp .6s ease .3s both}
.h-title .hl{background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.h-sub{font-family:'Sora',sans-serif;font-size:clamp(1.1rem,2.5vw,1.4rem);font-weight:300;color:var(--text-secondary);margin-bottom:32px;animation:fadeUp .6s ease .4s both}
.h-desc{font-size:1rem;color:var(--text-secondary);max-width:640px;margin:0 auto 40px;line-height:1.75;animation:fadeUp .6s ease .5s both}

/* ══════════ VALUE CARDS ══════════ */
.vgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:40px}
.vcard{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:var(--transition);animation:fadeUp .5s ease both}
.vcard:nth-child(1){animation-delay:.5s}.vcard:nth-child(2){animation-delay:.6s}.vcard:nth-child(3){animation-delay:.7s}
.vcard:hover{border-color:var(--accent-warm);box-shadow:var(--shadow-glow);transform:translateY(-3px)}
.vicon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:14px;color:#fff}
.vicon.og{background:linear-gradient(135deg,#E8703A,#F4A261)}.vicon.tl{background:linear-gradient(135deg,#2ABFAA,#7EC8D9)}.vicon.dk{background:linear-gradient(135deg,var(--charcoal),#555)}
.vcard h3{font-family:'Sora',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:8px}
.vcard p{font-size:.85rem;color:var(--text-secondary);line-height:1.6}

/* ══════════ DIMS PREVIEW ══════════ */
.dimprev{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:40px;animation:fadeUp .5s ease .8s both}
.dimprev h3{font-family:'Sora',sans-serif;font-size:1rem;font-weight:700;margin-bottom:20px;text-align:center}
.dlist{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ditem{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);background:var(--bg-secondary);font-size:.82rem;font-weight:600;transition:var(--transition)}
.ditem:hover{transform:translateX(4px)}
.ddot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ddot.c1{background:#E8703A}.ddot.c2{background:#F4A261}.ddot.c3{background:#2ABFAA}.ddot.c4{background:#7EC8D9}.ddot.c5{background:#9B59B6}.ddot.c6{background:#E67E22}

/* ══════════ CTA ══════════ */
.cta-s{text-align:center;padding:32px 0 20px;animation:fadeUp .5s ease 1s both}
.btn-p{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;background:var(--charcoal);color:#fff;border:none;border-radius:100px;font-family:'Sora',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:var(--transition);letter-spacing:-.01em}
.dark .btn-p{background:#F0EFEB;color:var(--charcoal)}
.btn-p:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}.btn-p:active{transform:translateY(0)}
.btn-gradient{position:relative;background:var(--btn-gradient)!important;background-size:300% 300%!important;color:#fff!important;padding:18px 44px;font-size:1.05rem;border:none;animation:gradShift 6s ease infinite;overflow:hidden;box-shadow:0 6px 30px rgba(232,112,58,.3),0 2px 10px rgba(42,191,170,.2)}
.btn-gradient::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);transform:skewX(-20deg);animation:shimmer 3.5s ease-in-out infinite 1.5s}
.btn-gradient:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 10px 40px rgba(232,112,58,.4),0 4px 16px rgba(42,191,170,.3)}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes shimmer{0%{left:-100%}100%{left:150%}}
.btn-s{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:transparent;color:var(--text-primary);border:2px solid var(--border);border-radius:100px;font-family:'Sora',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:var(--transition)}
.btn-s:hover{border-color:var(--accent-warm);color:var(--accent-warm)}
.cta-note{font-size:.78rem;color:var(--text-muted);margin-top:14px}

/* ══════════ FORMS ══════════ */
.fg{margin-bottom:14px}
.fg input,.fg select{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Manrope',sans-serif;font-size:16px;background:var(--bg-primary);color:var(--text-primary);transition:var(--transition);-webkit-appearance:none}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--accent-warm);box-shadow:0 0 0 3px rgba(232,112,58,.1)}
.fg input::placeholder{color:var(--text-muted)}

/* ══════════ PROGRESS ══════════ */
.pw{margin-bottom:24px}
.pi{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pl{font-size:.78rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em}
.pc{font-family:'Sora',sans-serif;font-size:.85rem;font-weight:700;color:var(--accent-warm)}
.pbar{width:100%;height:6px;background:var(--bg-secondary);border-radius:100px;overflow:hidden}
.pfill{height:100%;background:var(--accent-gradient);border-radius:100px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ══════════ QUESTIONS ══════════ */
.dtag{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
.dtag.d1{background:rgba(232,112,58,.12);color:#E8703A}.dtag.d2{background:rgba(244,162,97,.12);color:#D4883A}
.dtag.d3{background:rgba(42,191,170,.12);color:#2ABFAA}.dtag.d4{background:rgba(126,200,217,.12);color:#5AA8BD}
.dtag.d5{background:rgba(155,89,182,.12);color:#9B59B6}.dtag.d6{background:rgba(230,126,34,.12);color:#E67E22}
.dark .dtag.d2{color:#F4A261}.dark .dtag.d4{color:#7EC8D9}
.qcard{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;margin-bottom:20px;animation:scaleIn .4s ease both}
.qnum{font-family:'Sora',sans-serif;font-size:.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.qtxt{font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:700;line-height:1.4;margin-bottom:24px}
.olist{display:flex;flex-direction:column;gap:10px}
.obtn{display:flex;align-items:flex-start;gap:14px;width:100%;padding:16px;background:var(--bg-primary);border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;text-align:left;font-family:'Manrope',sans-serif;font-size:.88rem;color:var(--text-primary);transition:var(--transition);line-height:1.5}
.obtn:hover{border-color:var(--accent-warm);background:rgba(232,112,58,.03);transform:translateX(4px)}
.obtn.sel{border-color:var(--accent-warm);background:rgba(232,112,58,.06);box-shadow:0 0 0 3px rgba(232,112,58,.08)}
.olevel{flex-shrink:0;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:.7rem;font-weight:800;background:var(--bg-secondary);color:var(--text-muted);transition:var(--transition)}
.obtn.sel .olevel{background:var(--accent-warm);color:#fff}
.navb{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:12px}
.btn-n{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border:1.5px solid var(--border);border-radius:100px;background:transparent;color:var(--text-primary);font-family:'Sora',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:var(--transition)}
.btn-n:hover{border-color:var(--accent-warm);color:var(--accent-warm)}
.btn-n:disabled{opacity:.3;cursor:not-allowed}.btn-n:disabled:hover{border-color:var(--border);color:var(--text-primary)}
.btn-n.fin{background:var(--charcoal);color:#fff;border-color:var(--charcoal)}
.dark .btn-n.fin{background:#F0EFEB;color:var(--charcoal);border-color:#F0EFEB}
.btn-n.fin:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}

/* ══════════ LOADING ══════════ */
.ld-s{text-align:center;padding:80px 0}
.ld-orb{width:80px;height:80px;margin:0 auto 30px;border-radius:50%;background:var(--accent-gradient);animation:pulseR 1.5s ease-in-out infinite;position:relative}
.ld-orb::after{content:'';position:absolute;inset:8px;border-radius:50%;background:var(--bg-primary)}
.ld-t{font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:600;margin-bottom:8px}
.ld-st{font-size:.85rem;color:var(--text-muted)}

/* ══════════ RESULTS ══════════ */
.rh{text-align:center;padding:30px 0 20px}
.rfor{font-size:.82rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.rname{font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:4px}
.rcomp{font-size:.95rem;color:var(--text-secondary);margin-bottom:30px}
.scard{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:36px;text-align:center;margin-bottom:24px;position:relative;overflow:hidden}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--accent-gradient)}
.sbig{font-family:'Sora',sans-serif;font-size:clamp(3rem,8vw,4.5rem);font-weight:800;line-height:1;margin-bottom:4px;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stot{font-size:.85rem;color:var(--text-muted);margin-bottom:16px}
.lvlb{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:100px;font-family:'Sora',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:16px}
.lvlb.l1{background:rgba(232,93,93,.1);color:var(--error)}.lvlb.l2{background:rgba(244,162,97,.12);color:#D4883A}
.lvlb.l3{background:rgba(42,191,170,.1);color:#2ABFAA}.lvlb.l4{background:rgba(232,112,58,.1);color:#E8703A}
.dark .lvlb.l2{color:#F4A261}
.lvld{font-size:.92rem;color:var(--text-secondary);line-height:1.7;max-width:580px;margin:0 auto}
.bnote{font-size:.78rem;color:var(--accent-warm);margin-top:12px;font-weight:600}

/* ══════════ DIM BARS ══════════ */
.dimr{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:24px}
.dimr h3{font-family:'Sora',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:20px}
.dbr{margin-bottom:16px;animation:slideR .4s ease both}
.dbr:nth-child(2){animation-delay:.1s}.dbr:nth-child(3){animation-delay:.2s}.dbr:nth-child(4){animation-delay:.3s}.dbr:nth-child(5){animation-delay:.4s}.dbr:nth-child(6){animation-delay:.5s}
.dbl{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.dbn{font-size:.82rem;font-weight:600}.dbn .btl{color:var(--accent-warm);font-size:.68rem;margin-left:6px}
.dbs{font-family:'Sora',sans-serif;font-size:.78rem;font-weight:700;color:var(--accent-warm)}
.dbt{width:100%;height:8px;background:var(--bg-secondary);border-radius:100px;overflow:hidden}
.dbf{height:100%;border-radius:100px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.dbf.c1{background:linear-gradient(90deg,#E8703A,#F4A261)}.dbf.c2{background:linear-gradient(90deg,#F4A261,#F7C97E)}
.dbf.c3{background:linear-gradient(90deg,#2ABFAA,#5CD4C1)}.dbf.c4{background:linear-gradient(90deg,#7EC8D9,#A5DBE8)}
.dbf.c5{background:linear-gradient(90deg,#9B59B6,#BB8FCE)}.dbf.c6{background:linear-gradient(90deg,#E67E22,#F0A04B)}

/* ══════════ RECS ══════════ */
.recs{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:24px}
.recs h3{font-family:'Sora',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:20px}
.recc{display:flex;gap:14px;padding:18px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:12px;transition:var(--transition);animation:slideR .4s ease both}
.recc:nth-child(2){animation-delay:.15s}.recc:nth-child(3){animation-delay:.3s}
.recc:hover{border-color:var(--accent-warm);transform:translateX(4px)}
.recn{flex-shrink:0;width:32px;height:32px;border-radius:10px;background:var(--accent-gradient);display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:.75rem;font-weight:800;color:#fff}
.recb h4{font-family:'Sora',sans-serif;font-size:.88rem;font-weight:700;margin-bottom:4px}
.recb p{font-size:.82rem;color:var(--text-secondary);line-height:1.6}

/* ══════════ AGENT BOX ══════════ */
.agentbox{background:var(--bg-card);border:2px solid var(--accent-teal);border-radius:var(--radius);padding:28px;margin-bottom:24px;position:relative;overflow:hidden}
.agentbox::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(42,191,170,.04),rgba(126,200,217,.04));pointer-events:none}
.agentbox .agent-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;background:rgba(42,191,170,.12);color:var(--accent-teal);margin-bottom:12px;position:relative}

function detectLanguage(){
  try{var p=new URLSearchParams(window.location.search).get('lang');if(p==='es'||p==='en')return p}catch(e){}
  try{var s=localStorage.getItem('vm_ai_test_lang');if(s==='es'||s==='en')return s}catch(e){}
  return(navigator.language||'').toLowerCase().startsWith('es')?'es':'en';
}

function setLang(l){
  if(l!=='es'&&l!=='en')return;lang=l;
  try{localStorage.setItem('vm_ai_test_lang',l)}catch(e){}
  try{var u=new URL(window.location);u.searchParams.set('lang',l);window.history.replaceState({},'',u)}catch(e){}
  document.getElementById('langEs').classList.toggle('active',l==='es');
  document.getElementById('langEn').classList.toggle('active',l==='en');
  document.documentElement.lang=l;
  var b=document.getElementById('backBtn');b.href=l==='en'?'/en':'/';
  document.getElementById('backTxt').textContent=L[l].backBtn;
  renderLanding();renderLoadingText();
  if(document.getElementById('secAss').classList.contains('active'))renderQ();
  if(document.getElementById('secGate').classList.contains('active'))renderGate();
}

/* ========== QUESTIONS ========== */
function getDimForQ(qi){for(var i=0;i<dims.length;i++){if(dims[i].qs.indexOf(qi)!==-1)return i}return 0}
function renderQ(){
  var c=t(),q=c.questions[curQ],di=getDimForQ(curQ);
  document.getElementById('pFill').style.width=((curQ+1)/c.questions.length*100)+'%';
  document.getElementById('pCnt').textContent=(curQ+1)+' / '+c.questions.length;
  document.getElementById('pDim').textContent=c.dims[di];
  var h='<div class="qcard"><div class="dtag d'+(di+1)+'"><i class="fa-solid fa-layer-group"></i> '+c.dims[di]+'</div><div class="qnum">'+c.qPregunta+' '+(curQ+1)+' '+c.qOf+' '+c.questions.length+'</div><div class="qtxt">'+q.t+'</div><div class="olist">';
  var lvls=['N1','N2','N3','N4'];
  q.o.forEach(function(opt,idx){h+='<button class="obtn'+(ans[curQ]===(idx+1)?' sel':'')+'" onclick="selOpt('+curQ+','+(idx+1)+')"><span class="olevel">'+lvls[idx]+'</span><span>'+opt+'</span></button>'});
  h+='</div></div>';document.getElementById('qCont').innerHTML=h;
  document.getElementById('bPrev').disabled=curQ===0;document.getElementById('bPrev').innerHTML=c.prevBtn;
  var bn=document.getElementById('bNext');
  if(curQ===c.questions.length-1){bn.innerHTML=c.finBtn;bn.classList.add('fin')}else{bn.innerHTML=c.nextBtn;bn.classList.remove('fin')}
}
function selOpt(qi,val){ans[qi]=val;document.querySelectorAll('.obtn').forEach(function(b,i){b.classList.toggle('sel',i===val-1)})}
function nextQ(){var c=t();if(ans[curQ]===undefined){showModal(c.modalSelect);return}if(curQ<c.questions.length-1){curQ++;renderQ();document.getElementById('qCont').scrollIntoView({behavior:'smooth',block:'start'})}else{showResults()}}
function prevQ(){if(curQ>0){curQ--;renderQ()}}

/* ========== SCORING ========== */
function dimLevel(di){var d=dims[di],s=0;d.qs.forEach(function(qi){s+=(ans[qi]||1)});var r=s/(d.qs.length*4);return r>=.875?3:r>=.625?2:r>=.375?1:0}
function computeBottleneck(){var ml=3,md=2;bottleneckDims.forEach(function(di){var l=dimLevel(di);if(l<ml){ml=l;md=di}});return{level:ml,dimIdx:md}}

/* ========== SUPABASE+API ========== */
function saveToSupabase(p){var sb=getSupabase();if(!sb)return;sb.from('arri_submissions').insert([{email:p.email||null,lang:p.lang||'en',total_score:p.total||0,level_name:p.level||'',level_index:p.levelIndex||0,bottleneck_dimension:p.bottleneckDimension||null,recommended_system:p.sys||null,dimension_scores:p.dimScores||null,raw_payload:p}]).then(function(r){if(r.error)console.error('[Supabase]',r.error)}).catch(function(e){console.error('[Supabase]',e)})}
function sendPayload(p){window._lastPayload=p;saveToSupabase(p);fetch('/api/assessment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}).catch(function(e){console.error('API',e)})}

/* ========== RESULTS ========== */
function showResults(){var c=t();for(var i=0;i<c.questions.length;i++){if(ans[i]===undefined){showModal(c.modalMissing.replace('{n}',i+1));curQ=i;renderQ();return}}renderGate();goTo('secGate')}
function computeResults(){
  var c=t(),total=0;for(var k in ans)total+=ans[k];
  var ds=dims.map(function(d,di){var s=0,m=d.qs.length*4;d.qs.forEach(function(qi){s+=(ans[qi]||1)});return{name:c.dims[di],color:d.color,score:s,max:m,pct:Math.round(s/m*100),dimIdx:di}});
  var bn=computeBottleneck(),li=bn.level,lv=c.levels[li],bdn=c.dims[bn.dimIdx];
  var ud=window._userData||{};
  window._resultPayload={name:ud.name||'',company:ud.company||'',role:ud.role||'',email:ud.email||'',whatsapp:ud.whatsapp||'',total:total,level:lv.name,levelIndex:li,dimScores:ds,recs:lv.recs,sys:lv.pack.name,recommendedAgents:lv.pack.agents.map(function(a){return a.name}),ns:lv.ns,bottleneckDimension:bdn,lang:lang,timestamp:new Date().toISOString(),version:'3.0'};
  sendPayload(window._resultPayload);
  document.getElementById('rFor').textContent=ud.company?(c.rFor+' '+ud.company):c.rFor;
  document.getElementById('rNm').textContent=ud.name||'';document.getElementById('rCo').textContent=ud.role||'';
  animScore(document.getElementById('sBig'),total);document.getElementById('sTot').textContent=c.sTot;
  document.getElementById('lvBadge').className='lvlb '+lv.css;document.getElementById('lvBadge').innerHTML='<i class="'+lv.icon+'"></i> '+lv.name;
  document.getElementById('lvDesc').textContent=lv.desc;document.getElementById('bNote').textContent=c.bottleneckNote.replace('{dim}',bdn);
  document.getElementById('dimrH').innerHTML=c.dimrH;
